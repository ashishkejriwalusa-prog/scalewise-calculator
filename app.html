<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ScaleWise App</title>
  <meta name="description" content="Installable ScaleWise mobile app experience for accounting, finance support, calculators, and client engagement.">
  <meta name="theme-color" content="#061A33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ScaleWise">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{--navy:#061A33;--navy2:#0A2946;--gold:#E8BD62;--white:#fff}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--navy);font-family:Inter,Arial,sans-serif}
    body{overflow:hidden}
    .shell{position:fixed;inset:0;background:var(--navy)}
    .loader{position:absolute;inset:0;z-index:2;display:grid;place-items:center;background:linear-gradient(135deg,var(--navy),var(--navy2));color:var(--white);transition:opacity .28s ease,visibility .28s ease}
    .loader.hide{opacity:0;visibility:hidden}
    .brand{display:grid;gap:14px;text-align:center;padding:24px}
    .mark{width:82px;height:82px;margin:auto;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);display:grid;place-items:center}
    .brand strong{font-family:Georgia,serif;font-size:30px;letter-spacing:.08em;text-transform:uppercase}
    .brand span{color:rgba(255,255,255,.78);font-size:14px;line-height:1.55}
    iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#f6f8fb}
  </style>
</head>
<body>
  <div class="shell">
    <div class="loader" id="loader" aria-live="polite">
      <div class="brand">
        <div class="mark"><svg viewBox="0 0 48 48" width="54" height="54"><rect x="3" y="3" width="42" height="42" rx="10" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)"/><rect x="10" y="24" width="5" height="12" rx="2" fill="#e8bd62"/><rect x="18" y="18" width="5" height="18" rx="2" fill="#e8bd62"/><rect x="26" y="12" width="5" height="24" rx="2" fill="#e8bd62"/><rect x="34" y="7" width="5" height="29" rx="2" fill="#fff"/></svg></div>
        <strong>ScaleWise</strong>
        <span>Opening the mobile app experience...</span>
      </div>
    </div>
    <iframe id="appFrame" title="ScaleWise mobile app" src="/index.html"></iframe>
  </div>
  <script>
    const frame=document.getElementById('appFrame');
    const loader=document.getElementById('loader');
    frame.addEventListener('load',()=>loader.classList.add('hide'));
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
