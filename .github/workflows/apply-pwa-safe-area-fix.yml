name: Apply PWA safe area header fix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch iPhone PWA header alignment
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          marker = '/* iPhone PWA safe-area header alignment fix */'
          css = r'''
    /* iPhone PWA safe-area header alignment fix */
    @supports (padding-top: env(safe-area-inset-top)){
      .nav{top:0;padding-top:env(safe-area-inset-top)}
      .navin{height:76px;min-height:76px;align-items:center}
      .brand{min-height:48px;align-items:center;padding:4px 0;position:relative;z-index:120}
      .mark{flex:0 0 auto}
      .menuBtn{min-width:52px;min-height:52px;width:52px;height:52px;align-items:center;justify-content:center;position:relative;z-index:130;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
      .links{top:calc(76px + env(safe-area-inset-top))}
      .backdrop{inset:calc(76px + env(safe-area-inset-top)) 0 0}
    }
    @media(max-width:960px){
      @supports (padding-top: env(safe-area-inset-top)){
        .hero{padding-top:calc(112px + env(safe-area-inset-top))}
      }
    }
    @media(max-width:620px){
      @supports (padding-top: env(safe-area-inset-top)){
        .navin{height:70px;min-height:70px}
        .brand{min-height:50px;max-width:calc(100% - 66px);overflow:hidden}
        .brand strong{font-size:18px;line-height:1;white-space:nowrap}
        .mark{width:40px;height:40px}
        .menuBtn{min-width:54px;min-height:54px;width:54px;height:54px;margin-right:-4px;font-size:26px}
        .links{top:calc(70px + env(safe-area-inset-top))}
        .backdrop{top:calc(70px + env(safe-area-inset-top))}
        .hero{padding-top:calc(112px + env(safe-area-inset-top))}
      }
    }
'''
          if marker not in s:
              s = s.replace('  </style>', css + '\n  </style>')
              p.write_text(s)
          PY
      - name: Commit fix if changed
        run: |
          if git diff --quiet; then
            echo "No changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Fix iPhone PWA header safe area alignment"
            git push
          fi
