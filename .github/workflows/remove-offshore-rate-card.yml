name: Patch ScaleWise site content

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch overview, services and contact details
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          services_url = 'https://www.linkedin.com/company/scalewiseusa/services/'

          # Keep site in logo-matched navy + gold theme, no green/teal visual dominance
          replacements = {
              '#073f48':'#0a2946', '#073f4b':'#0a2946', '#0e7771':'#0a2946', '#075c55':'#0a2946', '#0f9f6e':'#e8bd62',
              'var(--teal)':'var(--navy2)', 'rgba(14,119,113,.45)':'rgba(232,189,98,.18)', 'rgba(14,119,113,.36)':'rgba(232,189,98,.16)',
              'linear-gradient(135deg,var(--navy),var(--teal))':'linear-gradient(135deg,var(--navy),var(--navy2))',
              'linear-gradient(135deg,#061a33,#073f48)':'linear-gradient(135deg,#061a33,#0a2946)',
              'linear-gradient(135deg,#020b19,#073f48)':'linear-gradient(135deg,#020b19,#0a2946)',
              'linear-gradient(135deg,#020b19,#062340 55%,#073f48)':'linear-gradient(135deg,#020b19,#061a33 55%,#0a2946)',
              'linear-gradient(135deg,#020b19,#062340 52%,#0b3c4b)':'linear-gradient(135deg,#020b19,#061a33 52%,#0a2946)',
          }
          for old, new in replacements.items():
              s = s.replace(old, new)
          s = re.sub(r'--teal:\s*#[0-9a-fA-F]{6};', '--teal:#0a2946;', s)
          s = re.sub(r'--green:\s*#[0-9a-fA-F]{6};', '--green:#e8bd62;', s)

          # Ensure fixed-header scrolling and active nav underline
          if 'scroll-margin-top:96px' not in s:
              s = s.replace('section{padding:84px 0}', 'section{padding:84px 0;scroll-margin-top:96px}')
          s = s.replace('.nav{position:sticky;', '.nav{position:fixed;left:0;right:0;')
          if '.links a.active::after' not in s:
              s = s.replace('.links a{color:rgba(255,255,255,.78);font-weight:800;text-decoration:none;font-size:14px}', '.links a{color:rgba(255,255,255,.78);font-weight:800;text-decoration:none;font-size:14px;position:relative}.links a::after{content:"";position:absolute;left:0;right:0;bottom:-12px;height:3px;border-radius:999px;background:linear-gradient(90deg,#ffda84,#e8bd62);transform:scaleX(0);transform-origin:left;transition:transform .25s ease}.links a.active{color:#fff}.links a.active::after{transform:scaleX(1)}')

          # Ensure navigation includes About and Book Services
          s = s.replace('<div class="links"><a href="#services">Services</a>', '<div class="links"><a href="#about">About</a><a href="#services">Services</a>')
          if 'Book Services' not in s:
              s = s.replace('<a href="#contact">Contact</a>', '<a href="#contact">Contact</a><a href="' + services_url + '" target="_blank" rel="noopener">Book Services</a>')

          # Add/ensure map diagram styles
          if '.mapBridge{' not in s:
              s = s.replace('.card ul{margin:14px 0 0;padding-left:18px}', '.card ul{margin:14px 0 0;padding-left:18px}.mapBridge{margin:18px 0 20px;padding:18px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(232,189,98,.25)}.mapSvg{width:100%;height:auto;display:block}.mapLabel{font-weight:900;fill:#ffda84;font-size:14px}.mapSmall{fill:rgba(255,255,255,.78);font-size:11px;font-weight:700}.mapNode{fill:rgba(255,255,255,.1);stroke:#e8bd62;stroke-width:2}.mapLine{stroke:#ffda84;stroke-width:3;stroke-dasharray:8 8;filter:drop-shadow(0 0 8px rgba(232,189,98,.45))}')

          # Redesigned premium Overview section
          overview = '''<section id="about"><div class="container"><div class="head"><h2>Overview</h2><p>ScaleWise is a global finance and advisory firm helping businesses scale smarter through strategic finance, accounting excellence, and data-driven decision-making.</p></div><div class="grid2"><div class="card" style="padding:32px"><span style="display:inline-flex;padding:8px 12px;border-radius:999px;background:#fff6df;color:#73510b;font-weight:900;font-size:12px;margin-bottom:14px">Scale Smarter</span><h3 style="font-size:30px;line-height:1.15;margin-bottom:14px">Finance execution, advisory discipline, and offshore capacity in one model.</h3><p>We partner with CPA firms, startups, and mid-sized enterprises to deliver scalable, cost-efficient, and high-impact finance solutions that drive profitability and operational efficiency.</p><p>Our integrated service model combines deep financial expertise with global delivery capabilities, enabling organizations to streamline processes, improve visibility, and make better business decisions.</p><div class="grid2" style="grid-template-columns:1fr 1fr;gap:12px;margin-top:18px"><div style="border:1px solid #e6ebf2;border-radius:18px;padding:16px;background:#fbfcff"><b>Strategic finance</b><br><span style="color:#667085;font-size:14px">Visibility, reporting, and decision support.</span></div><div style="border:1px solid #e6ebf2;border-radius:18px;padding:16px;background:#fbfcff"><b>Accounting excellence</b><br><span style="color:#667085;font-size:14px">Clean books, reconciliations, and close support.</span></div><div style="border:1px solid #e6ebf2;border-radius:18px;padding:16px;background:#fbfcff"><b>Global delivery</b><br><span style="color:#667085;font-size:14px">U.S. leadership with India execution capacity.</span></div><div style="border:1px solid #e6ebf2;border-radius:18px;padding:16px;background:#fbfcff"><b>Cost efficiency</b><br><span style="color:#667085;font-size:14px">Scalable support without bloated hiring.</span></div></div><p style="margin-top:18px"><a href="https://www.linkedin.com/company/scalewiseusa/services/" target="_blank" rel="noopener" style="color:#061a33;font-weight:900;text-decoration:none">Book ScaleWise Services on LinkedIn →</a></p></div><div class="card" style="background:linear-gradient(135deg,#061a33,#0a2946);color:#fff;border-color:rgba(232,189,98,.25);padding:32px"><h3 style="color:#ffda84;font-size:26px">USA revenue center + India cost center</h3><div class="mapBridge"><svg class="mapSvg" viewBox="0 0 560 220" xmlns="http://www.w3.org/2000/svg" aria-label="ScaleWise USA and India operating model"><defs><radialGradient id="g" cx="50%" cy="50%"><stop offset="0%" stop-color="#ffda84" stop-opacity="0.32"/><stop offset="100%" stop-color="#e8bd62" stop-opacity="0.05"/></radialGradient></defs><rect class="mapNode" x="30" y="54" width="170" height="100" rx="22"/><text class="mapLabel" x="115" y="92" text-anchor="middle">USA</text><text class="mapSmall" x="115" y="118" text-anchor="middle">Revenue Center</text><text class="mapSmall" x="115" y="140" text-anchor="middle">Client + Advisory</text><rect class="mapNode" x="360" y="54" width="170" height="100" rx="22"/><text class="mapLabel" x="445" y="92" text-anchor="middle">INDIA</text><text class="mapSmall" x="445" y="118" text-anchor="middle">Surat, Gujarat</text><text class="mapSmall" x="445" y="140" text-anchor="middle">Offshore Cost Center</text><path class="mapLine" d="M205 104 C260 54 310 154 355 104" fill="none"/><circle cx="280" cy="104" r="31" fill="url(#g)" stroke="#e8bd62"/><text class="mapLabel" x="280" y="109" text-anchor="middle">SW</text><text class="mapSmall" x="280" y="186" text-anchor="middle">Integrated delivery model: U.S. client ownership + India execution capacity</text></svg></div><p style="color:rgba(255,255,255,.78)"><b>ScaleWise USA</b> leads client relationships, advisory oversight, revenue ownership, and quality governance.</p><p style="color:rgba(255,255,255,.78)"><b>ScaleWise India — Surat, Gujarat</b> operates as the offshore cost center for accounting execution, reconciliations, reporting preparation, bookkeeping, and finance back-office support.</p><p><a href="https://www.linkedin.com/company/scalewiseusa" target="_blank" rel="noopener" style="color:#ffda84;font-weight:900;text-decoration:none">Visit ScaleWise on LinkedIn →</a></p></div></div></div></section>'''
          if '<section id="about">' in s and '<section id="services">' in s:
              s = re.sub(r'<section id="about">.*?<section id="services">', overview + '\n<section id="services">', s, flags=re.S)
          else:
              s = s.replace('<section id="services">', overview + '\n<section id="services">')

          # Expanded Services section, adding tax and cryptocurrency accounting
          services = '''<section id="services"><div class="container"><div class="head"><h2>Accounting support built for scale</h2><p>From bookkeeping to tax-ready accounting and cryptocurrency accounting support, ScaleWise gives finance teams and CPA firms disciplined capacity without bloated hiring.</p><p><a href="https://www.linkedin.com/company/scalewiseusa/services/" target="_blank" rel="noopener" style="color:#061a33;font-weight:900;text-decoration:none">Book ScaleWise Services on LinkedIn →</a></p></div><div class="grid3"><div class="card"><h3>Bookkeeping & Accounting</h3><p>Recurring transaction coding, clean books, bank reconciliations, payroll support coordination, and tax-ready records.</p></div><div class="card"><h3>AP, AR & Reconciliations</h3><p>Vendor bills, customer follow-ups, aging support, cash application, account reconciliations, and weekly issue tracking.</p></div><div class="card"><h3>Reporting & Close Support</h3><p>Month-end schedules, management reporting support, variance prep, controller review packages, and documentation.</p></div><div class="card"><h3>Tax-Ready Accounting</h3><p>Organized books, supporting schedules, reconciled accounts, year-end cleanup, and CPA-ready reporting support.</p></div><div class="card"><h3>Cryptocurrency Accounting</h3><p>Crypto transaction organization, exchange data support, wallet activity tracking, reconciliation prep, and tax-ready crypto accounting workflows.</p></div><div class="card"><h3>CPA Firm Offshore Support</h3><p>White-label capacity for bookkeeping, cleanup projects, monthly accounting, reporting preparation, and seasonal workload support.</p></div></div></div></section>'''
          s = re.sub(r'<section id="services">.*?<section class="darkSec" id="industries">', services + '\n<section class="darkSec" id="industries">', s, flags=re.S)

          # Remove all duplicate address lines, then keep exactly one in the contact card only
          address_p = '<p style="margin-top:12px;color:rgba(255,255,255,.82)">30 N Gould St Ste 61480, Sheridan, WY 82801</p>'
          s = s.replace(address_p, '')
          s = re.sub(r'<p style="color:rgba\(255,255,255,\.78\)"><b>Company Address:</b><br>30 N Gould St Ste 61480<br>Sheridan, WY 82801</p>', '', s)
          s = re.sub(r'<p><b>Company Address:</b><br>30 N Gould St Ste 61480<br>Sheridan, WY 82801</p>', '', s)
          s = s.replace('Send your calculator result and ScaleWise will help identify the right offshore accounting setup.</p>', 'Send your calculator result and ScaleWise will help identify the right offshore accounting setup.</p>' + address_p)

          # Add contact LinkedIn/services links if missing
          s = s.replace('<div><p><a href="mailto:info@scalewise.group">info@scalewise.group</a></p><p><a href="tel:+13072850020">+1 307 285 0020</a></p></div></div></div></section>', '<div><p><a href="mailto:info@scalewise.group">info@scalewise.group</a></p><p><a href="tel:+13072850020">+1 307 285 0020</a></p><p><a href="https://www.linkedin.com/company/scalewiseusa" target="_blank" rel="noopener">LinkedIn Page →</a></p><p><a href="https://www.linkedin.com/company/scalewiseusa/services/" target="_blank" rel="noopener">Book Services →</a></p></div></div></div></section>')

          # Add robust click scrolling JS with active bar movement above existing calculator script
          scroll_js = """\n<script>document.addEventListener('click',function(e){var a=e.target.closest('a[href^="#"]');if(!a)return;var h=a.getAttribute('href');var t=h==='#home'?document.body:document.querySelector(h);if(!t)return;e.preventDefault();document.querySelectorAll('.links a').forEach(function(x){x.classList.remove('active')});var navLink=document.querySelector('.links a[href="'+h+'"]');if(navLink)navLink.classList.add('active');var nav=document.querySelector('.nav');var off=nav?nav.offsetHeight+16:90;var y=h==='#home'?0:t.getBoundingClientRect().top+window.pageYOffset-off;window.scrollTo({top:y,behavior:'smooth'});history.pushState(null,'',h);});window.addEventListener('scroll',function(){var ids=['about','services','industries','calculator','contact'];var nav=document.querySelector('.nav');var off=(nav?nav.offsetHeight:76)+120;var current='';ids.forEach(function(id){var sec=document.getElementById(id);if(sec&&sec.offsetTop-off<=window.pageYOffset)current=id});if(current){document.querySelectorAll('.links a').forEach(function(x){x.classList.toggle('active',x.getAttribute('href')==='#'+current)})}});</script>\n"""
          if 'classList.toggle(\'active\'' not in s and 'classList.toggle("active"' not in s:
              s = s.replace('<script>\nconst qs=', scroll_js + '<script>\nconst qs=')

          p.write_text(s, encoding='utf-8')
          print('Patched ScaleWise site: redesigned overview, expanded services, single contact address')
          PY
      - name: Commit change if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet index.html; then
            git add index.html
            git commit -m "Redesign overview and expand services"
            git push
          else
            echo "No changes to commit"
          fi
