<div class="field">
  <label for="market">Market <small>sets salary default</small></label>
  <select id="market" required>
    <option value="" selected disabled>Select market</option>
    <option value="US">United States</option>
    <option value="UK">United Kingdom</option>
    <option value="AU">Australia</option>
  </select>
</div>

<div class="field">
  <label for="staff">Current accountants/bookkeepers <small>full-time equivalent</small></label>
  <input id="staff" type="number" min="1" max="200" value="" placeholder="Enter team size" />
</div>

<div class="field">
  <label for="salary">Average annual salary per accountant</label>
  <input id="salary" type="number" min="10000" step="1000" value="" placeholder="Enter annual salary" />
</div>

<div class="field">
  <label for="software">Monthly accounting software cost</label>
  <input id="software" type="number" min="0" step="50" value="" placeholder="Enter monthly software cost" />
</div>

<div class="field">
  <label for="hours">Hours spent on accounting tasks per week</label>
  <input id="hours" type="number" min="0" max="200" value="" placeholder="Enter weekly hours" />
  <div class="hint">
    Used to estimate hidden owner/CFO review time at a market-based blended rate.
  </div>
</div>
