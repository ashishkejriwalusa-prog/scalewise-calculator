<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ScaleWise | Offshore Accounting & Finance Support</title>
  <meta name="description" content="ScaleWise helps CPA firms, startups, and growing businesses strengthen bookkeeping, accounting, reporting, tax-ready workflows, FP&A, and offshore finance operations.">
</head>
<body>
  <script>
    (async function () {
      const repo = 'ashishkejriwalusa-prog/scalewise-calculator';
      const originalBlobSha = '4f7e6025c2a60d67f7972dced06be6ab3b39bbf0';

      const styleBlock = [
        '<style>',
        '@keyframes scalewiseOfferFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.018)}}',
        '@keyframes scalewiseOfferGlow{0%,100%{box-shadow:0 24px 70px rgba(232,189,98,.28),0 0 0 0 rgba(232,189,98,.38)}50%{box-shadow:0 30px 86px rgba(232,189,98,.45),0 0 0 10px rgba(232,189,98,.07)}}',
        '@keyframes scalewiseShine{0%{translate:-60% 0}55%,100%{translate:60% 0}}',
        '.hero .heroGrid{align-items:center}',
        '.heroSide{display:grid;gap:22px;align-items:start;justify-items:end}',
        '.scalewisePromoCard{position:relative;z-index:7;width:min(318px,100%);border-radius:22px;padding:17px 17px 16px;background:linear-gradient(145deg,rgba(6,26,51,.98),rgba(10,41,70,.96));border:1px solid rgba(255,218,132,.72);color:#fff;text-decoration:none;overflow:hidden;animation:scalewiseOfferFloat 3.8s ease-in-out infinite,scalewiseOfferGlow 2.5s ease-in-out infinite;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}',
        '.scalewisePromoCard.is-hidden{display:none!important}',
        '.scalewisePromoCard:before{content:"";position:absolute;inset:-48%;background:linear-gradient(120deg,transparent 36%,rgba(255,255,255,.32) 49%,transparent 62%);transform:rotate(18deg);animation:scalewiseShine 3.4s ease-in-out infinite}',
        '.scalewisePromoInner{position:relative;z-index:1;display:block}',
        '.scalewisePromoClose{position:absolute;top:10px;right:10px;z-index:3;width:30px;height:30px;border-radius:999px;border:1px solid rgba(255,255,255,.34);background:rgba(255,255,255,.08);color:#fff;font-size:20px;line-height:1;cursor:pointer;display:grid;place-items:center}',
        '.scalewisePromoClose:hover{background:rgba(255,255,255,.18)}',
        '.scalewisePromoLabel{display:inline-flex;align-items:center;gap:7px;margin-bottom:10px;padding:7px 36px 7px 10px;border-radius:999px;background:rgba(255,218,132,.16);border:1px solid rgba(255,218,132,.38);color:#ffefc2;font-size:10.5px;font-weight:1000;letter-spacing:.08em;text-transform:uppercase}',
        '.scalewisePromoGift{font-size:14px}',
        '.scalewisePromoHours{display:block;margin:0;color:#ffda84;font-size:31px;line-height:.95;font-weight:1000;letter-spacing:-.055em}',
        '.scalewisePromoTitle{display:block;margin-top:4px;font-size:15.5px;line-height:1.22;font-weight:1000;letter-spacing:-.02em}',
        '.scalewisePromoRisk{display:inline-flex;align-items:center;justify-content:center;margin:11px 0 10px;padding:8px 12px;border-radius:999px;background:linear-gradient(135deg,#ffda84,#e8bd62);color:#071b34;font-size:15px;line-height:1;font-weight:1000;box-shadow:0 10px 24px rgba(232,189,98,.22)}',
        '.scalewisePromoText{display:block;margin:0 0 13px;color:rgba(255,255,255,.78);font-size:12.5px;line-height:1.42;font-weight:700}',
        '.scalewisePromoBtn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:9px 12px;background:#fff;color:#071b34;font-size:12px;font-weight:1000;text-decoration:none}',
        '@media(max-width:1100px){.heroSide{justify-items:center}.scalewisePromoCard{width:min(330px,calc(100vw - 36px));margin-bottom:4px}}',
        '@media(max-width:620px){.scalewisePromoCard{width:min(318px,calc(100vw - 28px))}.scalewisePromoHours{font-size:29px}.scalewisePromoTitle{font-size:15px}}',
        '</style>'
      ].join('');

      const promoCard = [
        '<div class="heroSide">',
        '<a class="scalewisePromoCard" id="scalewisePromoCard" href="#client-engagement" aria-label="Claim ScaleWise promotional offer of 20 free hours for new clients">',
        '<button class="scalewisePromoClose" id="scalewisePromoClose" type="button" aria-label="Close promotional offer">×</button>',
        '<span class="scalewisePromoInner">',
        '<span class="scalewisePromoLabel"><span class="scalewisePromoGift">🎁</span> Limited-Time Offer</span>',
        '<strong class="scalewisePromoHours">20 FREE HOURS</strong>',
        '<strong class="scalewisePromoTitle">Accounting & Finance Support</strong>',
        '<span class="scalewisePromoRisk">$0 Risk Trial</span>',
        '<span class="scalewisePromoText">For new clients exploring bookkeeping, CPA support, payroll, or finance operations.</span>',
        '<span class="scalewisePromoBtn">Claim Offer →</span>',
        '</span>',
        '</a>',
        '<div class="heroCard">'
      ].join('');

      const dismissScript = '<script>(function(){try{var k="scalewisePromoDismissed";var c=document.getElementById("scalewisePromoCard");var x=document.getElementById("scalewisePromoClose");if(localStorage.getItem(k)==="1"&&c)c.classList.add("is-hidden");if(x&&c)x.addEventListener("click",function(e){e.preventDefault();e.stopPropagation();localStorage.setItem(k,"1");c.classList.add("is-hidden");});}catch(e){}})();<\/script>';

      const response = await fetch('https://api.github.com/repos/' + repo + '/git/blobs/' + originalBlobSha);
      const blob = await response.json();
      const binary = atob(blob.content.replace(/\n/g, ''));
      const bytes = Uint8Array.from(binary, function (char) { return char.charCodeAt(0); });
      let html = new TextDecoder('utf-8').decode(bytes);
      html = html.replace('</style>', styleBlock + '</style>');
      html = html.replace('<div class="heroCard">', promoCard);
      html = html.replace('</div></div></div></section>\n    <section class="outcomes"', '</div></div></div></div></section>' + dismissScript + '\n    <section class="outcomes"');
      document.open();
      document.write(html);
      document.close();
    })();
  </script>
</body>
</html>
