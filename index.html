<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ScaleWise | Offshore Accounting & Finance Support</title>
  <meta name="description" content="ScaleWise helps CPA firms, startups, and growing businesses strengthen bookkeeping, accounting, reporting, tax-ready workflows, FP&A, and offshore finance operations.">
</head>
<body>
  <script>
    (async function(){
      const originalBlobSha = '4f7e6025c2a60d67f7972dced06be6ab3b39bbf0';
      const repo = 'ashishkejriwalusa-prog/scalewise-calculator';
      const promoImage = '7B949CBD-55E1-4E83-AA68-31D0D4583472.png';
      const target = '<p>ScaleWise helps CPA firms and growth-oriented businesses build more disciplined finance operations through dependable accounting support, reporting rigor, tax-ready execution, and controller-level operating insight.</p>';
      const replacement = target + '<img src="' + promoImage + '" alt="ScaleWise promotional offer: 20 hours of free service for new clients" style="width:100%; height:auto; display:block; border-radius:16px; margin-top:28px; box-shadow:0 24px 70px rgba(6,26,51,.16);">';
      try {
        const response = await fetch('https://api.github.com/repos/' + repo + '/git/blobs/' + originalBlobSha);
        const blob = await response.json();
        const binary = atob(blob.content.replace(/\n/g, ''));
        const bytes = Uint8Array.from(binary, function(char){ return char.charCodeAt(0); });
        let html = new TextDecoder('utf-8').decode(bytes);
        html = html.replace(target, replacement);
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<main style="font-family:Inter,Arial,sans-serif;max-width:1100px;margin:60px auto;padding:24px"><h1>ScaleWise</h1><p>Promotional offer: 20 hours of free service for new clients.</p><img src="' + promoImage + '" alt="ScaleWise promotional offer: 20 hours of free service for new clients" style="width:100%;height:auto;display:block;border-radius:16px;"></main>';
      }
    })();
  </script>
</body>
</html>
