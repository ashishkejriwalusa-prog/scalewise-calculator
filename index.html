<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ScaleWise | Offshore Accounting & Finance Support</title>
  <meta name="description" content="ScaleWise helps CPA firms, startups, and growing businesses strengthen bookkeeping, accounting, reporting, tax-ready workflows, FP&A, and offshore finance operations.">
</head>
<body>
  <script>
    (async function () {
      const repo = 'ashishkejriwalusa-prog/scalewise-calculator';
      const originalBlobSha = '4f7e6025c2a60d67f7972dced06be6ab3b39bbf0';
      const promoImage = '7B949CBD-55E1-4E83-AA68-31D0D4583472.png';

      const heroStart = '<section class="hero"><div class="container heroGrid">';
      const promoBlock = [
        '<section class="hero">',
        '<style>',
        '@keyframes scalewiseOfferFlash{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.74;transform:scale(1.018)}}',
        '.scalewisePromoFlash{animation:scalewiseOfferFlash 1.45s ease-in-out infinite;position:relative;z-index:2;margin:0 auto 34px;max-width:980px}',
        '.scalewisePromoFlash img{width:100%;height:auto;display:block;border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.26)}',
        '</style>',
        '<div class="container"><div class="scalewisePromoFlash"><img src="' + promoImage + '" alt="ScaleWise promotional offer: 20 hours of free service for new clients"></div></div>',
        '<div class="container heroGrid">'
      ].join('');

      const response = await fetch('https://api.github.com/repos/' + repo + '/git/blobs/' + originalBlobSha);
      const blob = await response.json();
      const binary = atob(blob.content.replace(/\n/g, ''));
      const bytes = Uint8Array.from(binary, function (char) { return char.charCodeAt(0); });
      let html = new TextDecoder('utf-8').decode(bytes);
      html = html.replace(heroStart, promoBlock);
      document.open();
      document.write(html);
      document.close();
    })();
  </script>
</body>
</html>
