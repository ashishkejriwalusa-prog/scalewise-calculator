[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo Static ScaleWise deploy"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/insights"
  to = "/.netlify/functions/insights"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin-insights"
  to = "/.netlify/functions/admin-insights"
  status = 200
  force = true
