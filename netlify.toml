[build]
  publish = "."
  functions = "netlify/functions"
  command = "python3 patch_seo.py && python3 patch_direct_currency.py"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/insights"
  to = "/.netlify/functions/insights"
  status = 200
  force = true

[[edge_functions]]
  path = "/*"
  function = "pwa-safe-area-fix"
