[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Static ScaleWise site - no build step required'"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/insights"
  to = "/.netlify/functions/insights"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin-insights"
  to = "/.netlify/functions/admin-insights"
  status = 200
  force = true

[[edge_functions]]
  path = "/*"
  function = "pwa-safe-area-fix"
